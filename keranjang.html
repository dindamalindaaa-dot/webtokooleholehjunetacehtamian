<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Keranjang - Toko Junet Aceh</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.cart-box{
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container mt-4">

<h2> Keranjang Belanja</h2>

<!-- LIST KERANJANG -->
<div id="isiKeranjang"></div>

<hr>

<!-- TOTAL -->
<h4>
Total:
<span id="total">Rp 0</span>
</h4>

<!-- METODE PEMBAYARAN -->
<h5 class="mt-3">Metode Pembayaran</h5>
<input id="nama" placeholder="Nama kamu">
<input id="alamat" placeholder="Alamat kamu">

<select id="payment" class="form-control mb-3">
  <option value="COD">COD (Bayar di Tempat)</option>
  <option value="DANA">DANA</option>
  <option value="OVO">OVO</option>
  <option value="BANK">Bank Aceh</option>
</select>

<!-- INFO PAYMENT -->
<div id="paymentInfo" class="mb-3 text-primary"></div>

<!-- BUTTON CHECKOUT -->
<button class="btn btn-warning w-100 mb-2" onclick="checkout()">
Checkout
</button>

<!-- BUTTON WHATSAPP -->
<button class="btn btn-success w-100" onclick="kirimWA()">
Kirim Pesanan ke WhatsApp
</button>

</div>

<script src="js/script.js"></script>

<script>
tampilKeranjang();
</script>

</body>
</html>
