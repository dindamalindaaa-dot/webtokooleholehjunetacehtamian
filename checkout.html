<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Checkout - Toko Junet Aceh</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR SEDERHANA -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">TOKO JUNET ACEH</a>
</div>
</nav>

<div class="container mt-4">

<h2 class="mb-4">Checkout Pesanan</h2>

<!-- FORM DATA -->
<div class="card p-3 mb-3">

<h5>Data Pembeli</h5>

<input id="nama" class="form-control mb-2" placeholder="Nama Lengkap">
<input id="alamat" class="form-control mb-2" placeholder="Alamat Lengkap">

</div>

<!-- METODE PEMBAYARAN -->
<div class="card p-3 mb-3">

<h5>Metode Pembayaran</h5>

<select id="payment" class="form-control">
<option value="COD">COD (Bayar di Tempat)</option>
<option value="Transfer">Transfer Bank</option>
<option value="Cash">Cash</option>
</select>

</div>

<!-- INFO -->
<div class="alert alert-info">
Pastikan data sudah benar sebelum melakukan pembayaran.
</div>

<!-- BUTTON -->
<button class="btn btn-success w-100" onclick="checkout()">
Bayar Sekarang
</button>

</div>

<!-- SCRIPT WAJIB -->
<script src="js/script.js"></script>

</body>
</html>
