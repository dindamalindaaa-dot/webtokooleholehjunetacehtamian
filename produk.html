<div class="container mt-4">

<h2 class="judul text-center mb-4">
SEMUA PRODUK
</h2>

<div class="row mb-4">
<div class="col-md-6 mx-auto">

<input
type="text"
id="searchInput"
class="form-control"
placeholder="Cari produk..."
onkeyup="cariProduk()">

</div>
</div>

<div class="row" id="produkContainer">

<div class="col-md-3 mb-4 produk">
<div class="card h-100">
<img src="images/pisang-sale.jpg" class="card-img-top">
<div class="card-body">
<h5>Pisang Sale Basah</h5>
<p>Rp 50.000</p>

<button
class="btn btn-junet w-100"
onclick="tambahKeranjang('Pisang Sale Basah',50000)">
Tambah Keranjang
</button>

</div>
</div>
</div>

<div class="col-md-3 mb-4 produk">
<div class="card h-100">
<img src="images/kopi-gayo.jpg" class="card-img-top">
<div class="card-body">
<h5>Kopi Gayo 500 Gram</h5>
<p>Rp 50.000</p>

<button
class="btn btn-junet w-100" 
onclick="tambahKeranjang('Kopi Gayo 500 Gram',50000)">
Tambah Keranjang
</button>

</div>
</div>
</div>

<div class="col-md-3 mb-4 produk">
<div class="card h-100">
<img src="images/kue-karah.jpg" class="card-img-top">
<div class="card-body">
<h5>Kue Karah</h5>
<p>Rp 15.000</p>

<button
class="btn btn-junet w-100"
onclick="tambahKeranjang('Kue Karah',15000)">
Tambah Keranjang
</button>

</div>
</div>
</div>

<div class="col-md-3 mb-4 produk">
<div class="card h-100">
<img src="images/dodol.jpg" class="card-img-top">
<div class="card-body">
<h5>Dodol Aceh</h5>
<p>Rp 25.000</p>

<button
class="btn btn-junet w-100"
onclick="tambahKeranjang('Dodol Aceh',25000)">
Tambah Keranjang
</button>

</div>
</div>
</div>

</div>

<footer>
<div class="container text-center">

<p>WhatsApp : 0822-7599-6118</p>
<p>Instagram : @tokooleholehjunet</p>

<script>
function cariProduk(){

let input =
document.getElementById("searchInput")
.value.toUpperCase();

let produk =
document.getElementsByClassName("produk");

for(let i=0;i<produk.length;i++){

let nama =
produk[i].getElementsByTagName("h5")[0];

if(nama.innerHTML.toUpperCase().indexOf(input)>-1){
produk[i].style.display="";
}else{
produk[i].style.display="none";
}

}
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
tampilProduk();
